services:
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        for b in lakehouse bronze silver gold; do
          mc mb --ignore-existing local/$$b
        done
        echo "Buckets ready: lakehouse, bronze, silver, gold"

  spark:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: lakehouse-spark
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_TOKEN: lakehouse
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ../:/workspace
      # Ivy cache survives restarts → Maven JARs only download once
      - ivy-cache:/home/jovyan/.ivy2
      - ipython-cache:/home/jovyan/.cache
    working_dir: /workspace
    command:
      - bash
      - -c
      - |
        set -e
        export PATH="/home/jovyan/.local/bin:$$PATH"
        export PYTHONPATH="/workspace/scripts:$$PYTHONPATH"
        echo ">> Installing Python deps (cached after first run)…"
        pip install --quiet --user \
          pyspark==3.5.0 \
          delta-spark==3.2.0 \
          jupytext==1.16.4 \
          faker==30.3.0
        echo ">> Auto-converting .py percent files to .ipynb (one-time per file)…"
        cd /workspace/notebooks && for f in *.py; do
          ipynb="$${f%.py}.ipynb"
          [ -f "$$ipynb" ] || jupytext --to notebook "$$f"
        done
        cd /workspace/notebooks-spark && for f in *.py; do
          ipynb="$${f%.py}.ipynb"
          [ -f "$$ipynb" ] || jupytext --to notebook "$$f"
        done
        echo ">> Starting Jupyter (token: lakehouse)…"
        cd /workspace
        start-notebook.py \
          --IdentityProvider.token=lakehouse \
          --ServerApp.root_dir=/workspace

volumes:
  minio-data:
  ivy-cache:
  ipython-cache:
